name: accessibility-engineer
description: Accessibility remediation environment
version: 0.1.0
entrypoint: server.app:main

tasks:
  - id: task_easy
    difficulty: easy
    max_steps: 10
    grader:
      type: llm
      prompt_template: >
        You are an expert accessibility grader. Look at the provided HTML DOM. 
        The task was to fix a missing aria-label on the 'checkout-btn' element.
        - If the 'checkout-btn' has a descriptive aria-label, output exactly 0.9.
        - If the aria-label is present but empty or poorly named, output exactly 0.5.
        - If there is no aria-label, output exactly 0.1.
        Output ONLY the numeric score.

  - id: task_medium
    difficulty: medium
    max_steps: 15
    grader:
      type: llm
      prompt_template: >
        You are an expert accessibility grader. Look at the provided HTML DOM. 
        The task was to fix a dropdown menu so screen readers can determine if it is open/closed and read it as an interactive menu rather than a plain text list.
        
        Evaluate the HTML for the following exact fixes and sum their associated weights:
        1. Does the element with id 'menu-toggle' have the 'aria-expanded' attribute? (If yes, add 0.4)
        2. Does the element with id 'menu-list' have the attribute 'role="menu"'? (If yes, add 0.2)
        3. Does the element with id 'item-1' have the attribute 'role="menuitem"'? (If yes, add 0.2)
        4. Does the element with id 'item-2' have the attribute 'role="menuitem"'? (If yes, add 0.2)
        
        Calculate the total score based on the sum of the weights:
        - If all criteria are met (sum = 1.0), output exactly 0.9.
        - If none of the criteria are met (sum = 0.0), output exactly 0.1.
        - Otherwise, output the exact calculated sum (e.g., 0.4, 0.6, 0.8).
        
        Output ONLY the numeric score between 0.1 and 0.9.

  - id: task_hard
    difficulty: hard
    max_steps: 15
    grader:
      type: llm
      prompt_template: >
        You are an expert accessibility grader. Look at the provided HTML DOM. 
        The task was to ensure that a temporary notification (toast) is correctly announced to screen readers when it becomes visible.
        
        Evaluate the HTML for the following exact fixes and sum their associated weights:
        1. Does the element with id 'toast-container' have the attribute 'aria-live="polite"' (or 'aria-live' set to 'polite')? (If yes, add 0.5)
        2. Does the element with id 'toast-container' have the attribute 'role="status"'? (If yes, add 0.5)
        
        Calculate the total score based on the sum of the weights:
        - If all criteria are met (sum = 1.0), output exactly 0.9.
        - If none of the criteria are met (sum = 0.0), output exactly 0.1.
        - Otherwise, output the exact calculated sum (e.g., 0.5).
        
        Output ONLY the numeric score between 0.1 and 0.9.
    